<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – IRS Consultants</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } 

    body {
      font-family: 'DM Sans', sans-serif;
      background: #111;
    }

    .contact-section {
      position: relative;
      min-height: 340px;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: #1a1f1a;
    }

    /* Dark overlay with subtle green tint */
    .contact-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        rgba(10, 18, 10, 0.88) 0%,
        rgba(15, 28, 18, 0.75) 50%,
        rgba(8, 15, 10, 0.82) 100%
      );
      z-index: 1;
    }

    /* Subtle background texture */
    .contact-section::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(52, 211, 153, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(52, 211, 153, 0.04) 0%, transparent 50%);
      z-index: 1;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: grayscale(30%);
      z-index: 0;
    }

    /* Fallback background if no image */
    .bg-fallback {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, #1a2e1a 0%, #0f1f14 40%, #0a1510 100%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    /* LEFT COLUMN */
    .left-col h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 400;
      color: #ffffff;
      line-height: 1.25;
      margin-bottom: 28px;
      letter-spacing: -0.01em;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 28px;
    }

    .contact-info p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
    }

    .contact-info a {
      color: #34d399;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-info a:hover {
      color: #6ee7b7;
    }

    .self-service {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }

    /* RIGHT COLUMN */
    .right-col {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 32px 28px;
      backdrop-filter: blur(12px);
    }

    .form-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #34d399;
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.02em;
    }

    .form-group label .required {
      color: #f87171;
      margin-left: 2px;
    }

    .form-group input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      width: 100%;
    }

    .form-group input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .form-group input:focus {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.06);
      color: rgba(255,255,255,0.9);
    }

    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: flex-end;
    }

    .btn-send {
      background: #34d399;
      color: #0a1510;
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      width: 100%;
      letter-spacing: 0.01em;
    }

    .btn-send:hover {
      background: #6ee7b7;
      box-shadow: 0 4px 20px rgba(52, 211, 153, 0.3);
    }

    .btn-send:active {
      transform: scale(0.98);
    }

    /* Success message */
    .success-msg {
      display: none;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #6ee7b7;
      font-size: 0.85rem;
      margin-top: 14px;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        gap: 36px;
        padding: 36px 24px;
      }
      .form-row, .bottom-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<section class="contact-section">
  <div class="bg-fallback"></div>
  <!-- To use a real photo, uncomment below and add your image path: -->
  <!-- <img class="bg-image" src="your-background-photo.jpg" alt=""/> -->

  <div class="container">

    <!-- LEFT -->
    <div class="left-col">
      <h2>Cant find the answers you're looking for? Drop us a message, We'd be happy to help!</h2>

      <div class="contact-info">
        <p>Contact Number: <a href="tel:+27210144072">021 014 4072</a></p>
        <p>WhatsApp: <a href="tel:+27752711727">075 271 1727</a></p>
        </div>

      <p class="self-service">Is self service your thing? Then click one of the links below.</p>
    </div>

    <!-- RIGHT -->
    <div class="right-col">
      <p class="form-title">Request A Call</p>

      <div class="form-row">
        <div class="form-group">
          <label>First Name <span class="required">*</span></label>
          <input type="text" id="firstName" placeholder="First name here" required />
        </div>
        <div class="form-group">
          <label>Last Name <span class="required">*</span></label>
          <input type="text" id="lastName" placeholder="Last name here" required />
        </div>
      </div>

      <div class="bottom-row">
        <div class="form-group">
          <label>Contact Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="Phone number here" required />
        </div>
        <button class="btn-send" onclick="handleSubmit()">Send Message</button>
      </div>

      <div class="success-msg" id="successMsg">
        ✓ Thanks! We'll give you a call shortly.
      </div>
    </div>

  </div>
</section>

<script>
  function handleSubmit() {
    const first = document.getElementById('firstName').value.trim();
    const last = document.getElementById('lastName').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!first || !last || !phone) {
      alert('Please fill in all required fields.');
      return;
    }

    // Show success message
    document.getElementById('successMsg').style.display = 'block';

    // Clear fields
    document.getElementById('firstName').value = '';
    document.getElementById('lastName').value = '';
    document.getElementById('phone').value = '';

    // Hide after 4 seconds
    setTimeout(() => {
      document.getElementById('successMsg').style.display = 'none';
    }, 4000);
  }
</script>

</body>
</html>
